# pre-commit 本地闸门 — 与 CI 同源 (复用 scripts/*.sh, 不重复逻辑)
#   安装: pipx install pre-commit && pre-commit install
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: scan-secrets
        name: scan-secrets (占位 + 指纹闸门)
        entry: bash scripts/scan-secrets.sh
        language: system
        pass_filenames: false

      - id: check-shell
        name: shell 语法 + shellcheck
        entry: bash scripts/check-shell.sh
        language: system
        pass_filenames: false
        files: '(-code|\.sh)$'

      - id: cn-plugin-test
        name: cn-plugin 测试
        entry: npm test
        language: system
        pass_filenames: false
        files: '^orchestration/cn-plugin/'
