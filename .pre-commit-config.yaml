# pre-commit local gate — same source as CI (reuses scripts/*.ts, no duplicated logic)
#   install: pipx install pre-commit && pre-commit install
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: scan-secrets
        name: scan-secrets (placeholder + fingerprint gate)
        entry: node scripts/run-ts.mjs scripts/scan-secrets.ts
        language: system
        pass_filenames: false

      - id: check-launchers
        name: launcher syntax + no shell scripts
        entry: node scripts/run-ts.mjs scripts/check-launchers.ts
        language: system
        pass_filenames: false
        files: "(backends/bin/|orchestration/fuguectl/|scripts/check-launchers.ts|\\.sh$)"

      - id: cn-plugin-test
        name: cn-plugin tests
        entry: npm test
        language: system
        pass_filenames: false
        files: "^orchestration/cn-plugin/"
